name: CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - '.clang-format'
      - '.clang-tidy'
      - '.cppcheck-suppressions'
      - '.github/workflows/ci.yml'
  # PR では paths フィルタを付けない。必須ステータスチェックに設定している
  # ため、paths でワークフローがスキップされるとチェックが報告されず、PR が
  # "Expected — Waiting for status to report" のままマージ不能になるのを防ぐ。
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y gcc-14 clang-format clang-tidy cppcheck

      - name: Check formatting (clang-format)
        run: |
          clang-format --dry-run --Werror src/*.c src/*.h tests/*.c

      - name: Configure CMake (for compile_commands.json)
        run: |
          cmake -B build/debug \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=gcc-14 \
            -DPORTABLE_BUILD=ON

      - name: Build (for clang-tidy)
        run: cmake --build build/debug --parallel

      - name: Run clang-tidy
        run: |
          clang-tidy -p build/debug src/*.c src/*.h tests/*.c

      - name: Run cppcheck
        run: |
          cppcheck --enable=all --std=c17 \
            --suppressions-list=.cppcheck-suppressions \
            --library=posix \
            --error-exitcode=1 \
            --inline-suppr \
            --check-level=exhaustive \
            --force \
            -I src/ src/ tests/

  build:
    name: Build (${{ matrix.os }})
    needs: lint
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Cache CMake build
        uses: actions/cache@v5
        with:
          path: build
          key: ${{ runner.os }}-cmake-${{ hashFiles('CMakeLists.txt', 'src/**', 'tests/**') }}
          restore-keys: |
            ${{ runner.os }}-cmake-

      - name: Setup GCC 14 (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y gcc-14

      - name: Setup MSYS2 with GCC (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja

      - name: Verify GCC version (Linux)
        if: runner.os == 'Linux'
        run: |
          gcc-14 --version
          gcc-14 --version | head -1 | grep -E "gcc.* 1[4-9]\." || (echo "GCC 14+ required" && exit 1)

      - name: Verify GCC version (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          gcc --version
          gcc --version | head -1 | grep -E "gcc.* 1[4-9]\." || (echo "GCC 14+ required" && exit 1)

      # Configure Debug & Release in parallel
      - name: Configure CMake (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -B build/debug \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=gcc-14 \
            -DPORTABLE_BUILD=ON &
          cmake -B build/release \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc-14 \
            -DPORTABLE_BUILD=ON &
          wait

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          cmake -B build/debug -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DPORTABLE_BUILD=ON &
          cmake -B build/release -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DPORTABLE_BUILD=ON &
          wait

      # Build Debug & Release in parallel
      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake --build build/debug --parallel &
          cmake --build build/release --parallel &
          wait

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          cmake --build build/debug --parallel &
          cmake --build build/release --parallel &
          wait

      # Run tests (sequential to avoid resource contention)
      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "=== Debug tests ==="
          ctest --test-dir build/debug --output-on-failure --parallel $(nproc)
          echo "=== Release tests ==="
          ctest --test-dir build/release --output-on-failure --parallel $(nproc)

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          echo "=== Debug tests ==="
          ctest --test-dir build/debug --output-on-failure
          echo "=== Release tests ==="
          ctest --test-dir build/release --output-on-failure
